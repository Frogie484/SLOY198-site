<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Управление расписанием — SLOY198</title>
  <link rel="stylesheet" href="admin.css?v=20260607-2">
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section class="admin-login" data-admin-login>
      <div class="admin-login__card">
        <a class="admin-brand" href="index.html" aria-label="SLOY198 — на сайт">
          <span class="admin-brand__mark"></span>
          <span>SLOY198</span>
        </a>
        <p class="admin-kicker">Закрытый раздел</p>
        <h1>Управление расписанием</h1>
        <p>Войдите, чтобы добавлять слоты и работать с записями клиентов.</p>
        <form class="admin-form" data-login-form>
          <label>
            <span>Логин</span>
            <input name="login" type="text" autocomplete="username" required>
          </label>
          <label>
            <span>Пароль</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="admin-button admin-button--primary" type="submit">Войти</button>
          <p class="admin-message" data-login-message aria-live="polite"></p>
        </form>
      </div>
    </section>

    <section class="admin-dashboard" data-admin-dashboard hidden>
      <header class="admin-header">
        <div>
          <a class="admin-brand" href="index.html"><span class="admin-brand__mark"></span><span>SLOY198</span></a>
          <p>Расписание консультаций</p>
        </div>
        <button class="admin-button admin-button--quiet" type="button" data-logout>Выйти</button>
      </header>

      <section class="admin-stats" aria-label="Сводка расписания">
        <article><span>Свободно</span><strong data-stat-free>0</strong></article>
        <article><span>Занято</span><strong data-stat-booked>0</strong></article>
        <article><span>Недоступно</span><strong data-stat-unavailable>0</strong></article>
        <article><span>Новые заявки</span><strong data-stat-new>0</strong></article>
      </section>

      <section class="admin-panel">
        <div class="admin-panel__heading">
          <div>
            <p class="admin-kicker">Новый интервал</p>
            <h2>Добавить слот</h2>
          </div>
        </div>
        <form class="slot-form" data-slot-form>
          <label><span>Дата</span><input name="date" type="date" required></label>
          <label><span>Время</span><input name="time" type="time" required></label>
          <label>
            <span>Длительность</span>
            <select name="duration" required>
              <option value="30">30 минут</option>
              <option value="45">45 минут</option>
              <option value="60">60 минут</option>
              <option value="90">90 минут</option>
            </select>
          </label>
          <label>
            <span>Тип консультации</span>
            <input name="type" type="text" list="consultation-types" placeholder="Например, индивидуальная" required>
            <datalist id="consultation-types">
              <option value="Индивидуальная консультация"></option>
              <option value="Консультация по недвижимости"></option>
              <option value="Наставничество"></option>
              <option value="Онлайн-встреча"></option>
            </datalist>
          </label>
          <button class="admin-button admin-button--primary" type="submit">Добавить слот</button>
        </form>
        <p class="admin-message" data-slot-message aria-live="polite"></p>
      </section>

      <section class="admin-panel">
        <div class="admin-panel__heading admin-panel__heading--row">
          <div>
            <p class="admin-kicker">Календарь</p>
            <h2>Слоты и записи</h2>
          </div>
          <button class="admin-button admin-button--quiet" type="button" data-refresh>Обновить</button>
        </div>
        <div class="schedule-list" data-schedule-list>
          <p class="admin-empty">Загрузка расписания...</p>
        </div>
      </section>
    </section>
  </main>
  <script src="schedule-api.js?v=20260607-2"></script>
  <script src="admin.js?v=20260607-2"></script>
</body>
</html>
